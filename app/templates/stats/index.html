{% extends "base.html" %}

{% block content %}
<div x-data="stats()" x-init="fetchData()" class="space-y-6">
    <h2 class="text-2xl font-bold text-gray-900 dark:text-white">Statistics</h2>
    
    <!-- Heatmap -->
    <div class="bg-white dark:bg-gray-800 shadow rounded-lg p-6">
        <h3 class="text-lg font-medium text-gray-900 dark:text-white mb-4">Consistency Heatmap (Last 365 Days)</h3>
        <div class="overflow-x-auto">
            <div id="heatmap-container" class="flex space-x-1 min-w-full">
                <!-- Populated by JS -->
            </div>
        </div>
        <div class="mt-4 flex items-center justify-end text-sm text-gray-500">
            <span class="mr-2">Less</span>
            <span class="w-3 h-3 bg-gray-100 dark:bg-gray-700 mr-1"></span>
            <span class="w-3 h-3 bg-indigo-200 mr-1"></span>
            <span class="w-3 h-3 bg-indigo-400 mr-1"></span>
            <span class="w-3 h-3 bg-indigo-600 mr-1"></span>
            <span class="w-3 h-3 bg-indigo-800"></span>
            <span class="ml-2">More</span>
        </div>
    </div>
    
    <!-- Charts -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="bg-white dark:bg-gray-800 shadow rounded-lg p-6">
            <h3 class="text-lg font-medium text-gray-900 dark:text-white mb-4">Completion Trends</h3>
            <canvas id="trendsChart"></canvas>
        </div>
        <div class="bg-white dark:bg-gray-800 shadow rounded-lg p-6">
            <h3 class="text-lg font-medium text-gray-900 dark:text-white mb-4">Best Performing Habits</h3>
            <canvas id="bestHabitsChart"></canvas>
        </div>
    </div>
</div>

<script>
    function stats() {
        return {
            loading: true,
            hasData: false,
            
            fetchData() {
                fetch('/stats/data')
                    .then(response => response.json())
                    .then(data => {
                        this.hasData = data.heatmap.length > 0;
                        this.renderHeatmap(data.heatmap);
                        this.renderCharts(data);
                        this.loading = false;
                    });
            },
            
            renderHeatmap(logs) {
                const container = document.getElementById('heatmap-container');
                container.innerHTML = '';
                
                const allLogs = {};
                logs.forEach(date => {
                    allLogs[date] = (allLogs[date] || 0) + 1;
                });
                
                const today = new Date();
                const yearAgo = new Date();
                yearAgo.setDate(today.getDate() - 365);
                
                let weeks = [];
                let currentWeek = [];
                
                for (let d = new Date(yearAgo); d <= today; d.setDate(d.getDate() + 1)) {
                    const dateStr = d.toISOString().split('T')[0];
                    const count = allLogs[dateStr] || 0;
                    
                    let colorClass = 'bg-gray-100 dark:bg-gray-700';
                    if (count > 0) colorClass = 'bg-indigo-200';
                    if (count > 2) colorClass = 'bg-indigo-400';
                    if (count > 4) colorClass = 'bg-indigo-600';
                    if (count > 6) colorClass = 'bg-indigo-800';
                    
                    currentWeek.push(`<div class="w-3 h-3 ${colorClass} rounded-sm" title="${dateStr}: ${count}"></div>`);
                    
                    if (d.getDay() === 6 || d.getTime() === today.getTime()) {
                        weeks.push(`<div class="flex flex-col space-y-1">${currentWeek.join('')}</div>`);
                        currentWeek = [];
                    }
                }
                
                container.innerHTML = weeks.join('');
            },
            
            renderCharts(data) {
                // Trends Chart
                const ctxTrends = document.getElementById('trendsChart').getContext('2d');
                new Chart(ctxTrends, {
                    type: 'line',
                    data: {
                        labels: data.timeline.labels,
                        datasets: [{
                            label: 'Daily Completion Rate (%)',
                            data: data.timeline.rates,
                            borderColor: '#4F46E5',
                            backgroundColor: 'rgba(79, 70, 229, 0.1)',
                            fill: true,
                            tension: 0.3
                        }]
                    },
                    options: { 
                        responsive: true,
                        scales: {
                            y: { beginAtZero: true, max: 100 }
                        }
                    }
                });
                
                // Best Habits Chart
                const ctxBest = document.getElementById('bestHabitsChart').getContext('2d');
                new Chart(ctxBest, {
                    type: 'bar',
                    data: {
                        labels: data.performance.labels,
                        datasets: [{
                            label: 'Total Completions',
                            data: data.performance.data,
                            backgroundColor: '#10B981',
                        }]
                    },
                    options: { 
                        responsive: true,
                        scales: {
                            y: { beginAtZero: true, ticks: { stepSize: 1 } }
                        }
                    }
                });
            }
        }
    }
</script>
{% endblock %}
